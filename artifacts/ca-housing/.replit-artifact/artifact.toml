kind = "web"
previewPath = "/"
title = "California Housing Price Predictor"
version = "1.0.0"
id = "artifacts/ca-housing"
router = "path"

[[integratedSkills]]
name = "data-visualization"
version = "1.0.0"

[[services]]
localPort = 21684
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/ca-housing run dev"

[services.env]
PORT = "21684"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/ca-housing", "run", "build"]
publicDir = "artifacts/ca-housing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
